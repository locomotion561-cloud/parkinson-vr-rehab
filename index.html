<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkinson VR - Ritmik Uçuş v4.2</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0d1117;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .setup-group {
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 12px;
            width: 85%;
            max-width: 400px;
        }
        .setup-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #58a6ff;
        }
        .setup-group input {
            width: 100%;
            height: 10px;
            cursor: pointer;
        }
        .range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #8b949e;
            margin-top: 8px;
        }
        .btn {
            padding: 18px 45px;
            font-size: 1.4rem;
            background-color: #238636;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 25px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h2 style="margin-bottom: 5px; color: #58a6ff;">Klinik Uçuş Modu v4.2</h2>
        <p style="color: #8b949e; margin-bottom: 25px;">Uçağı başınızla yönetip kırmızı halkaların içinden geçin.</p>
        
        <div class="setup-group">
            <label for="size-scale">Geçiş Halkası Genişliği: 1 - 10</label>
            <input type="range" id="size-scale" min="1" max="10" value="5">
            <div class="range-labels"><span>1 (Dar / Zor)</span><span>10 (Geniş / Kolay)</span></div>
        </div>

        <div class="setup-group">
            <label for="speed-scale">Engel Geliş Ritmi (BPM): 1 - 10</label>
            <input type="range" id="speed-scale" min="1" max="10" value="4">
            <div class="range-labels"><span>1 (Yavaş)</span><span>10 (Hızlı)</span></div>
        </div>

        <button class="btn" onclick="startApp()">Uçuşu Başlat (30 Saniye)</button>
    </div>

    <a-scene id="main-scene">
        <a-sky color="#05070a"></a-sky>
        <a-grid color="#1f242c"></a-grid>

        <a-entity id="player-rig" camera look-controls position="0 1.6 0">
            
            <a-entity id="player-airplane" position="0 -0.25 -1" rotation="0 180 0">
                <a-cone radius-bottom="0.03" radius-top="0.001" height="0.15" material="color: #58a6ff; shader: flat" rotation="90 0 0"></a-cone>
                <a-triangle vertex-a="0 0 0" vertex-b="0.09 -0.05 -0.02" vertex-c="0 -0.05 0.05" material="color: #388bfd; shader: flat"></a-triangle>
                <a-triangle vertex-a="0 0 0" vertex-b="-0.09 -0.05 -0.02" vertex-c="0 -0.05 0.05" material="color: #388bfd; shader: flat"></a-triangle>
                <a-sphere radius="0.01" position="0 0.01 -0.03" material="color: #ffffff; shader: flat"></a-sphere>
            </a-entity>

            <a-entity 
                id="gaze-timer-ring"
                geometry="primitive: ring; radiusInner: 0.03; radiusOuter: 0.035"
                material="color: #ffcc00; shader: flat; opacity: 0.4"
                position="0 0 -0.99">
            </a-entity>
        </a-entity>

        <a-entity id="obstacle-container"></a-entity>
    </a-scene>

    <script>
        let audioCtx;
        let isPlaying = false;
        let bpm = 60;
        let runDuration = 30; 
        let startTime = 0;
        let metronomeId;
        
        const sceneEntity = document.getElementById('main-scene');
        const containerEntity = document.getElementById('obstacle-container');
        const timerRingEntity = document.getElementById('gaze-timer-ring');
        const airplaneEntity = document.getElementById('player-airplane');
        const cameraRig = document.getElementById('player-rig');

        let score = 0;
        let obstacles = [];
        let obstacleSpeed = 0.18; 
        let obstacleSizeFactor = 1.0;

        function startApp() {
            const sizeValue = parseInt(document.getElementById('size-scale').value);
            const speedValue = parseInt(document.getElementById('speed-scale').value);

            obstacleSizeFactor = 2.2 - (sizeValue * 0.16); 
            bpm = 40 + (speedValue * 5);

            document.getElementById('start-overlay').style.display = 'none';
            
            // VR Modunu Zorla Açma
            if (sceneEntity.hasLoaded) { sceneEntity.enterVR(); } 
            else { sceneEntity.addEventListener('loaded', () => sceneEntity.enterVR()); }
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            isPlaying = true;
            startTime = performance.now();

            const intervalTime = (60 / bpm) * 1000;
            metronomeId = setInterval(playTickAndSpawn, intervalTime);

            renderLoop();
        }

        function playTickAndSpawn() {
            if (!isPlaying) return;
            
            // Ses Çal
            if (audioCtx) {
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(650, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.06);
            }

            // Engel Üret
            let obstacle = document.createElement('a-entity');
            let randomX = (Math.random() - 0.5) * 2.8;
            let randomY = 1.6 + ((Math.random() - 0.5) * 1.4);
            let startZ = -20;

            obstacle.setAttribute('geometry', {
                primitive: 'torus',
                radius: 0.4 * obstacleSizeFactor,
                radiusTubular: 0.03
            });
            obstacle.setAttribute('material', 'color', '#ff3333; shader: flat; opacity: 0.8');
            obstacle.setAttribute('position', `${randomX} ${randomY} ${startZ}`);
            
            containerEntity.appendChild(obstacle);
            obstacles.push({ element: obstacle, x: randomX, y: randomY, z: startZ });
        }

        function renderLoop() {
            if (!isPlaying) return;

            let currentTime = performance.now();
            let elapsedTime = (currentTime - startTime) / 1000; 
            let timeLeft = runDuration - elapsedTime;

            if (timeLeft <= 0) { endSession(); return; }

            timerRingEntity.setAttribute('geometry', 'radiusOuter', 0.01 + ((timeLeft / runDuration) * 0.025));

            let cameraRotation = cameraRig.getAttribute('rotation');
            airplaneEntity.setAttribute('rotation', `0 180 ${cameraRotation.y * 1.5}`);

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.z += (obstacleSpeed * (bpm / 60) * 1.5);
                obs.element.setAttribute('position', `${obs.x} ${obs.y} ${obs.z}`);

                if (obs.z >= -1.2 && obs.z <= -0.8) {
                    let playerX = -Math.sin(cameraRotation.y * Math.PI / 180) * 3;
                    let playerY = 1.6 + (Math.sin(cameraRotation.x * Math.PI / 180) * 3);
                    let distance = Math.sqrt(Math.pow(playerX - obs.x, 2) + Math.pow(playerY - obs.y, 2));
                    
                    if (distance < (0.4 * obstacleSizeFactor)) {
                        score += 10;
                        obs.element.setAttribute('material', 'color', '#00ff00');
                    } else {
                        obs.element.setAttribute('material', 'color', '#ffaa00');
                    }
                }

                if (obs.z > 1) {
                    obs.element.parentNode?.removeChild(obs.element);
                    obstacles.splice(i, 1);
                }
            }
            requestAnimationFrame(renderLoop);
        }

        function endSession() {
            isPlaying = false;
            clearInterval(metronomeId);
            sceneEntity.exitVR();
            
            const overlay = document.getElementById('start-overlay');
            overlay.innerHTML = `
                <h2 style="color: #ffcc00;">Uçuş Tamamlandı</h2>
                <p style="font-size: 1.6rem; margin: 20px 0;">Skor: <strong>${score}</strong></p>
                <button class="btn" onclick="window.location.reload()">Yeniden Başlat</button>
            `;
            overlay.style.display = 'flex';
        }
    </script>
</body>
</html>
