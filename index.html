<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkinson VR - Ritmik Kafa Takip Rehabilitasyonu</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #238636;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }
        /* VR modu dışında skoru görebilmek için (opsiyonel ekran paneli) */
        #score-board {
            position: fixed;
            top: 10px; left: 10px;
            color: white; font-family: monospace; font-size: 20px;
            z-index: 10; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="score-board">Skor: <span id="score-val">0</span></div>

    <div id="start-overlay">
        <h2>Parkinson Ritmik Egzersiz Platformu v1.1</h2>
        <p style="max-width: 500px; line-height: 1.5;">
            Telefonu VR Box'a yerleştirmeden önce butona basın. <br>
            Ekran ikiye bölündüğünde gözlüğü takın. <br>
            <strong>Görev:</strong> Başınızı hareket ettirerek ortadaki artıyı yeşil kürenin üzerinde tutun.
        </p>
        <button class="btn" onclick="startApp()">Egzersizi Başlat</button>
    </div>

    <a-scene>
        
        <a-sky color="#0d1117"></a-sky>
        <a-grid color="#21262d"></a-grid>

        <a-entity camera look-controls position="0 1.6 0">
            <a-cursor 
                id="gaze-cursor"
                raycaster="objects: .targetable; interval: 100"
                position="0 0 -1"
                geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02"
                material="color: #ff3333; shader: flat; opacity: 0.8">
            </a-cursor>

            <a-text 
                id="vr-score-text" 
                value="Skor: 0" 
                position="-0.3 0.5 -1.5" 
                scale="0.4 0.4 0.4" 
                color="#ffffff" 
                font="monospace">
            </a-text>
        </a-entity>

        <a-entity 
            id="track-line"
            geometry="primitive: box; width: 4; height: 0.03; depth: 0.01" 
            material="color: #388bfd; opacity: 0.3; shader: flat" 
            position="0 1.6 -3">
        </a-entity>

        <a-entity 
            id="rhythm-target"
            class="targetable"
            geometry="primitive: sphere; radius: 0.18" 
            material="color: #00ff00; shader: flat" 
            position="0 1.6 -3">
        </a-entity>

    </a-scene>

    <script>
        let audioCtx;
        let isPlaying = false;
        let bpm = 60; 
        let intervalId;
        
        const targetEntity = document.getElementById('rhythm-target');
        const cursorEntity = document.getElementById('gaze-cursor');
        const scoreValDisplay = document.getElementById('score-val');
        const vrScoreDisplay = document.getElementById('vr-score-text');

        let maxAmplitude = 1.8; 
        let currentX = 0;
        let score = 0;
        let isTargetHovered = false; // İmleç hedef üzerinde mi kontrolü

        // Hedef algılama olayları (Event Listeners)
        cursorEntity.addEventListener('raycaster-intersection', function () {
            isTargetHovered = true;
            // Hasta hedefi yakaladığında küre maviye döner (Görsel Biofeedback)
            targetEntity.setAttribute('material', 'color', '#388bfd');
            cursorEntity.setAttribute('material', 'color', '#00ff00');
        });

        cursorEntity.addEventListener('raycaster-intersection-cleared', function () {
            isTargetHovered = false;
            // Hasta hedefi kaçırdığında küre tekrar yeşile, imleç kırmızıya döner
            targetEntity.setAttribute('material', 'color', '#00ff00');
            cursorEntity.setAttribute('material', 'color', '#ff3333');
        });

        function startApp() {
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('score-board').style.display = 'block';
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            isPlaying = true;

            const intervalTime = (60 / bpm) * 1000;
            intervalId = setInterval(playMetronomeTick, intervalTime);

            // Skor hesaplama döngüsü (Her 100 milisaniyede bir kontrol eder)
            setInterval(checkScore, 100);

            animateTarget();
        }

        // Skor Hesaplama Mekanizması
        function checkScore() {
            if (isPlaying && isTargetHovered) {
                score += 1;
                // Skoru hem normal ekranda hem VR arayüzünde güncelle
                scoreValDisplay.innerText = score;
                vrScoreDisplay.setAttribute('value', `Skor: ${score}`);
            }
        }

        function playMetronomeTick() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.06);
        }

        function animateTarget() {
            if (!isPlaying) return;
            const time = performance.now() * 0.002 * (bpm / 60);
            currentX = Math.sin(time) * maxAmplitude;
            targetEntity.setAttribute('position', `${currentX} 1.6 -3`);
            requestAnimationFrame(animateTarget);
        }
    </script>
</body>
</html>
