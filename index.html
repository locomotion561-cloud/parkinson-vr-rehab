<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkinson VR - Hassas Senkronizasyon v3.0</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0d1117;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .setup-group {
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 12px;
            width: 85%;
            max-width: 400px;
        }
        .setup-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #58a6ff;
        }
        .setup-group input {
            width: 100%;
            height: 10px;
            cursor: pointer;
        }
        .range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #8b949e;
            margin-top: 8px;
        }
        .btn {
            padding: 18px 45px;
            font-size: 1.4rem;
            background-color: #238636;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 25px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h2 style="margin-bottom: 5px;">Parkinson VR Klinik Egzersiz</h2>
        <p style="color: #8b949e; margin-bottom: 25px;">Hassas Alan ve Ritim Senkronizasyonlu Model</p>
        
        <div class="setup-group">
            <label for="size-scale">Top Büyüklüğü (Ekran Alanı): 1 - 10</label>
            <input type="range" id="size-scale" min="1" max="10" value="5">
            <div class="range-labels"><span>1 (Ekranın %5'i)</span><span>10 (Ekranın %20'si)</span></div>
        </div>

        <div class="setup-group">
            <label for="speed-scale">Ritim ve Top Hızı (BPM): 1 - 10</label>
            <input type="range" id="speed-scale" min="1" max="10" value="4">
            <div class="range-labels"><span>1 (Çok Yavaş)</span><span>10 (Dinamik/Hızlı)</span></div>
        </div>

        <button class="btn" onclick="startApp()">Egzersizi Başlat (30 Saniye)</button>
    </div>

    <a-scene id="main-scene">
        
        <a-sky color="#0a0c10"></a-sky>
        <a-grid color="#161b22"></a-grid>

        <a-entity camera look-controls position="0 1.6 0">
            
            <a-entity 
                id="gaze-center-point"
                geometry="primitive: ring; radiusInner: 0.002; radiusOuter: 0.006"
                material="color: #ff3333; shader: flat"
                position="0 0 -1">
            </a-entity>

            <a-entity 
                id="gaze-timer-ring"
                geometry="primitive: ring; radiusInner: 0.03; radiusOuter: 0.035"
                material="color: #ffcc00; shader: flat; opacity: 0.6"
                position="0 0 -1">
            </a-entity>

            <a-entity 
                id="gaze-raycaster" 
                raycaster="objects: .targetable; interval: 30" 
                position="0 0 0">
            </a-entity>

        </a-entity>

        <a-entity 
            geometry="primitive: plane; width: 6; height: 4" 
            material="color: #21262d; opacity: 0.05; shader: flat" 
            position="0 1.6 -3.02">
        </a-entity>

        <a-entity 
            id="rhythm-target"
            class="targetable"
            geometry="primitive: sphere; radius: 0.3" 
            material="color: #00ff00; shader: flat" 
            position="0 1.6 -3">
        </a-entity>

    </a-scene>

    <script>
        let audioCtx;
        let isPlaying = false;
        let bpm = 60;
        let runDuration = 30; 
        let startTime = 0;
        
        let metronomeId, scoreId;
        
        const sceneEntity = document.getElementById('main-scene');
        const targetEntity = document.getElementById('rhythm-target');
        const raycasterEntity = document.getElementById('gaze-raycaster');
        const centerPointEntity = document.getElementById('gaze-center-point');
        const timerRingEntity = document.getElementById('gaze-timer-ring');

        let maxAmplitudeX = 1.6; 
        let maxAmplitudeY = 0.6; 
        let score = 0;
        let isTargetHovered = false;

        // Temas Algılayıcıları
        raycasterEntity.addEventListener('raycaster-intersection', function () {
            isTargetHovered = true;
            targetEntity.setAttribute('material', 'color', '#388bfd'); 
            centerPointEntity.setAttribute('material', 'color', '#00ff00'); 
        });

        raycasterEntity.addEventListener('raycaster-intersection-cleared', function () {
            isTargetHovered = false;
            targetEntity.setAttribute('material', 'color', '#00ff00'); 
            centerPointEntity.setAttribute('material', 'color', '#ff3333'); 
        });

        function startApp() {
            const sizeValue = parseInt(document.getElementById('size-scale').value);
            const speedValue = parseInt(document.getElementById('speed-scale').value);

            // 3 Metre Uzaklık İçin Hassas Alan Hesaplaması (%5 alan için r=0.22, %20 alan için r=0.68)
            // Böylece skala 1 seçildiğinde %5, 10 seçildiğinde tam %20 ekran alan kaplaması simüle edilir.
            const targetRadius = 0.18 + ((sizeValue - 1) * (0.52 / 9));
            targetEntity.setAttribute('geometry', 'radius', targetRadius);

            // Klinik Hız Ölçeği (Skala 1 = 40 BPM [Çok Yavaş], Skala 10 = 85 BPM)
            bpm = 35 + (speedValue * 5);

            document.getElementById('start-overlay').style.display = 'none';
            
            // VR Bölünmüş Ekran Aktivasyonu
            if (sceneEntity.hasLoaded) {
                sceneEntity.enterVR();
            } else {
                sceneEntity.addEventListener('loaded', function () {
                    sceneEntity.enterVR();
                });
            }
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            isPlaying = true;
            startTime = performance.now();

            // Metronom Tetikleyicisi
            const intervalTime = (60 / bpm) * 1000;
            metronomeId = setInterval(playMetronomeTick, intervalTime);
            scoreId = setInterval(checkScore, 50);

            renderLoop();
        }

        function checkScore() {
            if (isPlaying && isTargetHovered) {
                score += 1;
            }
        }

        function playMetronomeTick() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(750, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.06);
        }

        function renderLoop() {
            if (!isPlaying) return;

            let currentTime = performance.now();
            let elapsedTime = (currentTime - startTime) / 1000; 
            let timeLeft = runDuration - elapsedTime;

            if (timeLeft <= 0) {
                timeLeft = 0;
                endSession();
                return;
            }

            // Halka Sayacı Küçültme Algoritması
            let progress = timeLeft / runDuration; 
            let currentRingRadiusOuter = 0.01 + (progress * 0.025);
            timerRingEntity.setAttribute('geometry', 'radiusOuter', currentRingRadiusOuter);

            // --- RİTME TAM BAĞLI HAREKET KONTROLÜ ---
            // 'timeFactor' doğrudan BPM'e göre kalibre edildi. 
            // Matematiksel salınım hızı artik metronom hızıyla birebir paralel akacak.
            const speedMultiplier = (bpm / 60) * Math.PI * 0.5; 
            const timeFactor = elapsedTime * speedMultiplier;
            
            // Sonsuzluk (8) Hareketi Formülasyonu
            let currentX = Math.sin(timeFactor) * maxAmplitudeX;
            let currentY = 1.6 + (Math.sin(timeFactor * 2) * maxAmplitudeY);

            targetEntity.setAttribute('position', `${currentX} ${currentY} -3`);

            requestAnimationFrame(renderLoop);
        }

        function endSession() {
            isPlaying = false;
            clearInterval(metronomeId);
            clearInterval(scoreId);
            
            sceneEntity.exitVR();
            
            const overlay = document.getElementById('start-overlay');
            overlay.innerHTML = `
                <h2 style="color: #ffcc00;">Egzersiz Tamamlandı</h2>
                <p style="font-size: 1.6rem; margin: 20px 0;">Toplam Başarı Skoru: <strong style="color:#58a6ff;">${score}</strong></p>
                <p style="color: #8b949e; max-width:400px;">Seçilen Ayarlar:<br>Top Büyüklüğü Skalası: ${document.getElementById('size-scale').value}/10<br>Hız Skalası: ${document.getElementById('speed-scale').value}/10 (${bpm} BPM)</p>
                <button class="btn" onclick="window.location.reload()">Yeni Seans Başlat</button>
            `;
            overlay.style.display = 'flex';
        }
    </script>
</body>
</html>
